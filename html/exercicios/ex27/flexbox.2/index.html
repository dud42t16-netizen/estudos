<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flex box</title>
    <style>

        body {
            background-color: aliceblue;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 1.1em;
        }

        main {
            background-color: rgb(149, 205, 255);
            padding: 15px;
            width: 85vw;
            height: 90vh;
            margin: auto;
            margin-top: 25px;
            border-radius: 15px;
            display: flex;
        }

        section {
            flex-direction: column;
            background-color: rgb(28, 100, 255);
            color: white;
            padding: 10px;
            border-radius: 25px;
            text-align: center;
            flex:auto
        }

        div {
            justify-content: center;
            margin-top: 200px;
        }

        a {
            color: white;
            text-decoration: none;
        }

        a:hover {
            color: rgba(0, 0, 0, 0.896);
        }

    </style>
</head>
<body>
    <main>
        <section>
           <div>
            <h1>tela de login</h1>
            <br>
            <p><input type="email" name="email" id="iemail" required></p>
            <p><input type="password" name="senha" id="isenha" required></p>
            <p><input type="submit" value="login"></p>
            <p><a href="login02.html">pag002</a></p>
           </div>
        </section>
    </main>
</body>
</html>
