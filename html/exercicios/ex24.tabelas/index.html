<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabelas</title>
    <style>
        * {
            border-collapse: collapse;
        }
        body {
            font-size: 1.3em;
            font-family: Arial, Helvetica, sans-serif;
        }
        td,th {
            border: 1px solid black;
            padding: 5px 5px;
            width: 120px;
        }
    </style>
</head>
<body>
    <h1>tabelas</h1>
    <table>
        <tr>
        <td>a1</td>
        <td>a2</td>
        <td>a3</td>
        </tr>
        <tr>
            <td>b1</td>
            <td>b2</td>
            <td>b3</td>
        </tr>
    </table>
    <br>
    <h1>tabelas grandes</h1>
    <br>
    <table>
        <thead>
            <tr>
                <th>lorem</th>
                <th>lorem</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>a1</td>
                <td>a2</td>

            </tr>
            <tr>
                <td>b1</td>
                <td>b2</td>

            </tr>
            <tr>
                <td>c1</td>
                <td>c2</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th>lorem</th>
                <th>lorem</th>
            </tr>
        </tfoot>
    </table>

    
</body>
</html>
