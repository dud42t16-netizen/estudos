<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>imagens dinamicas</title>
</head>
<body>
    <h1>ajuste de imagem automatico</h1>
<picture>
    <source media="(max-width:600px )" srcset="ton200.png">
    <source media="(max-width:1000px )" srcset="ton550.png">
 <img src="ton950.png" alt="ton">
</picture>
    <p>a largura maxima representa o tamanho maximo,o img começa com a imagem maior e sempre os sources acima com o max width no tamanho da imagem grande e o srcset com a imagem media, depois a imagem pequena no scrset com o max width da imagem media</p>
</body>
</html>
